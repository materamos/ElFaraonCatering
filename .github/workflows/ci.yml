name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Build and checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Astro and TypeScript
        run: npm run check

      - name: Check JavaScript syntax
        run: npm run check:js

      - name: Test admin rules
        run: npm run test:admin

      - name: Validate menu content
        if: github.actor != 'dependabot[bot]'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: npm run menu:validate

      - name: Audit Supabase schema
        if: github.actor != 'dependabot[bot]'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: npm run supabase:audit

      - name: Build
        if: github.actor != 'dependabot[bot]'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Verify dist secrets
        if: github.actor != 'dependabot[bot]'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: npm run verify:dist-secrets
