backend:
  name: git-gateway
  branch: main

publish_mode: simple
locale: "es"
media_folder: "public/uploads"
public_folder: "/uploads"
show_preview_links: false

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

editor:
  preview: false

collections:
  - name: "daily-dishes"
    label: "Menú del día"
    label_singular: "Plato del día"
    description: "Opciones rotativas de la jornada actual."
    folder: "src/content/daily-dishes"
    create: true
    delete: true
    extension: "yaml"
    format: "yaml"
    summary: "{{name}}"
    sortable_fields: ["commit_date", "name", "description", "price", "available"]
    slug: "{{slug}}"
    fields:
      - { label: "Nombre", name: "name", widget: "string", hint: "Nombre visible para el cliente." }
      - { label: "Descripción", name: "description", widget: "text", required: false, hint: "Texto breve opcional para explicar el plato." }
      - { label: "Precio", name: "price", widget: "number", min: 0, value_type: "int", hint: "Ingresar el valor en pesos, sin símbolos." }
      - { label: "Disponible", name: "available", widget: "boolean", default: true, hint: "Desactivar si hoy no debe aparecer como disponible." }
      - { label: "Imagen", name: "image", widget: "image", required: false, hint: "Opcional. Ideal: imagen horizontal 4:3 en 1200 x 900 px. Se guarda en /public/uploads para uso futuro en la tarjeta del menú." }
  - name: "fixed-dishes"
    label: "Minutas"
    label_singular: "Minuta"
    description: "Platos principales que forman parte del menú estable."
    folder: "src/content/fixed-dishes"
    create: true
    delete: true
    extension: "yaml"
    format: "yaml"
    summary: "{{name}}"
    sortable_fields: ["commit_date", "name", "description", "price", "available"]
    slug: "{{slug}}"
    fields:
      - { label: "Nombre", name: "name", widget: "string", hint: "Nombre visible para el cliente." }
      - { label: "Descripción", name: "description", widget: "text", required: false, hint: "Texto breve opcional para explicar el plato." }
      - { label: "Precio", name: "price", widget: "number", min: 0, value_type: "int", hint: "Ingresar el valor en pesos, sin símbolos." }
      - { label: "Disponible", name: "available", widget: "boolean", default: true, hint: "Desactivar si hoy no debe aparecer como disponible." }
      - { label: "Imagen", name: "image", widget: "image", required: false, hint: "Opcional. Ideal: imagen horizontal 4:3 en 1200 x 900 px. Se guarda en /public/uploads para uso futuro en la tarjeta del menú." }
  - name: "side-dishes"
    label: "Guarniciones"
    label_singular: "Guarnición"
    description: "Opciones de acompañamiento que pueden variar durante el día."
    folder: "src/content/side-dishes"
    create: true
    delete: true
    extension: "yaml"
    format: "yaml"
    summary: "{{name}}"
    sortable_fields: ["commit_date", "name", "description", "available"]
    slug: "{{slug}}"
    fields:
      - { label: "Nombre", name: "name", widget: "string", hint: "Nombre visible para el cliente." }
      - { label: "Descripción", name: "description", widget: "text", required: false, hint: "Texto breve opcional para aclarar cómo se sirve la guarnición." }
      - { label: "Disponible", name: "available", widget: "boolean", default: true, hint: "Desactivar si hoy no debe aparecer como disponible." }
      - { label: "Imagen", name: "image", widget: "image", required: false, hint: "Opcional. Ideal: imagen horizontal 4:3 en 1200 x 900 px. Se guarda en /public/uploads para uso futuro en la tarjeta del menú." }
  - name: "drinks"
    label: "Bebidas"
    label_singular: "Bebida"
    description: "Bebidas informativas disponibles para el buffet."
    folder: "src/content/drinks"
    create: true
    delete: true
    extension: "yaml"
    format: "yaml"
    summary: "{{name}}"
    sortable_fields: ["commit_date", "name", "description", "price", "available"]
    slug: "{{slug}}"
    fields:
      - { label: "Nombre", name: "name", widget: "string", hint: "Nombre visible para el cliente." }
      - { label: "Descripción", name: "description", widget: "text", required: false, hint: "Texto breve opcional para explicar la bebida." }
      - { label: "Precio", name: "price", widget: "number", min: 0, value_type: "int", hint: "Ingresar el valor en pesos, sin símbolos." }
      - { label: "Disponible", name: "available", widget: "boolean", default: true, hint: "Desactivar si hoy no debe aparecer como disponible." }
      - { label: "Imagen", name: "image", widget: "image", required: false, hint: "Opcional. Ideal: imagen horizontal 4:3 en 1200 x 900 px. Se guarda en /public/uploads para uso futuro en la tarjeta del menú." }
